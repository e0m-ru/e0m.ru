<div class="terminal-window">
    <header>
        <div class="button green" style="margin-left: 10px;"></div>
        <div class="button yellow"></div>
        <div class="button red"></div>
        <p style="margin: 5px 0 0 33%;">/var/log/*/error.log</p>
    </header>
    <section class="terminal">
        {% for ln in STDOUT_error %}
        <p>
            {{ ln }}
        </p>
        {% endfor %}
    </section>
</div>
