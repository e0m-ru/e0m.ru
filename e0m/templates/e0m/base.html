{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="e0m - motion designer site">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{{ title }}</title>
    <style>
        :root {
            --main-color: #{{ color }};
        }
    </style>
</head>

<body>
    <div id="main" class="grid">
        <header class="shadow">
            {% include "e0m/header.html" %}
        </header>
        <article>
        {{ color }}
        {% block content%}
        {% endblock content%}
    </article>
    <footer class="shadow">
        {% include "e0m/footer.html" %}
    </footer>
    </div>
</body>

</html>
